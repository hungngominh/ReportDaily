name: Daily Report Reminder Cron

on:
  schedule:
    # Mỗi phút, thứ 2-6, giờ UTC 1-13 (ICT 8:00-20:00)
    - cron: "* 1-13 * * 1-5"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          RESPONSE=$(curl -sS -L -w "\nHTTP_CODE:%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check")
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cron returned HTTP $HTTP_CODE"
            exit 1
          fi
