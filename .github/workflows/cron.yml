name: Daily Report Reminder Cron

on:
  schedule:
    # Mỗi phút, thứ 2-6, giờ UTC 1-13 (ICT 8:00-20:00)
    # Bao phủ toàn bộ khung giờ làm việc VN để hỗ trợ mọi cấu hình user
    # API endpoint tự kiểm tra schedule + interval từng user trong DB
    - cron: "* 1-13 * * 1-5"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check"
