name: Daily Report Reminder Cron

on:
  schedule:
    # Chạy mỗi phút trong khung giờ UTC 4:00-5:59 (ICT 11:00-12:59) - nhắc đầu ngày
    - cron: "* 4,5 * * 1-5"
    # Chạy mỗi phút trong khung giờ UTC 12:00-13:59 (ICT 19:00-20:59) - nhắc cuối ngày
    - cron: "* 12,13 * * 1-5"
  # Cho phép chạy thủ công để test
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check"
